<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="880" height="16" viewBox="0 0 880 16" role="img" aria-label="">
  <title></title>
  <style>
  svg{--bg1:#eef1f7;--bg2:#dde4ef;--ink:#1f2630;--mut:#5b6473;--accent:#2f5fe6;--stroke:rgba(20,26,48,.12);--frost:rgba(255,255,255,.60);--glow:#3f74ff;--auroraO:.46;--chip:#ffffff;--chipBd:rgba(20,26,48,.14)}@media (prefers-color-scheme:dark){svg{--bg1:#080b16;--bg2:#10162c;--ink:#f3f6fc;--mut:#aab3c5;--accent:#5ce1ff;--stroke:rgba(255,255,255,.12);--frost:rgba(8,11,22,.42);--glow:#7fe9ff;--auroraO:.70;--chip:rgba(255,255,255,.06);--chipBd:rgba(255,255,255,.16)}}
  text{font-family:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif}

  .s0{stop-color:var(--accent);stop-opacity:0}.s1{stop-color:var(--accent);stop-opacity:.5}
  .gs{stop-color:var(--glow)}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
  </style>
  <defs>
    <linearGradient id="ln" x1="0" x2="880" gradientUnits="userSpaceOnUse"><stop class="s0" offset="0"/><stop class="s1" offset=".5"/><stop class="s0" offset="1"/></linearGradient>
    <radialGradient id="cd"><stop class="gs" offset="0" stop-opacity=".8"/><stop class="gs" offset="1" stop-opacity="0"/></radialGradient>
  </defs>
  <rect x="0" y="7.5" width="880" height="1.5" rx="1" fill="url(#ln)"/>
  <ellipse cx="440" cy="8" rx="70" ry="6" fill="url(#cd)"/>
